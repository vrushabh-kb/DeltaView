<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Compare Companies</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1 class="logo">⚔️ Company Battle</h1>

<div class="compare-box">
    <input id="company1" placeholder="TCS">
    <span>VS</span>
    <input id="company2" placeholder="ITC">
    <button onclick="runComparison()">Compare</button>
</div>

<div id="output"></div>

<div class="charts">
    <canvas id="revChart"></canvas>
    <canvas id="profitChart"></canvas>
</div>

<div id="verdict"></div>

</div>

<script src="compare.js"></script>

</body>
</html>
